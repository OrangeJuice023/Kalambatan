version: 2

models:
  - name: dim_customer
    description: One row per customer with plan and churn status.
    columns:
      - name: customer_id
        tests: [unique, not_null]
  - name: dim_plan
    columns:
      - name: plan_id
        tests: [unique, not_null]
  - name: dim_date
    columns:
      - name: date_key
        tests: [unique, not_null]
  - name: fct_customer_month
    description: >
      Customer-month analytical spine. Grain: one row per customer per active
      month. Source of truth for KPIs and the churn-model training set.
    columns:
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_id
      - name: month_key
        tests: [not_null]
      - name: churned_this_month
        tests:
          - accepted_values:
              values: [0, 1]
  - name: fct_churn_events
    columns:
      - name: churn_id
        tests: [unique, not_null]
